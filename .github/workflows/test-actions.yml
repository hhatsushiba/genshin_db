name: Auto Create Pull Request

# 💡 トリガー：developブランチにコードがプッシュされたら動く
on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      # 1. コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 自動でプルリクエストを作成する定番アクション
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 自動で発行される一時的な権限トークン
          base: main                         # マージ先のブランチ
          branch: auto-pr/develop-to-main    # PR用に自動作成される一時的なブランチ名
          title: "【自動】develop から main への反映"
          body: |
            GitHub Actionsによって自動生成されたプルリクエストです。
            developブランチの変更をmainにマージします。
            変更内容を確認してマージしてください。