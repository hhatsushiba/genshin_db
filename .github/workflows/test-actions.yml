name: Auto Create Pull Request

# 💡 トリガー：mainブランチまたはfeatureブランチにコードがプッシュされたら動く
on:
  push:
    branches:
      - 'feature/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      # 1. コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 自動でプルリクエストを作成する
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          # 👇 ここを固定値ではなく、プッシュされた元のブランチ名にする
          branch: ${{ github.ref_name }}
          title: "【自動】${{ github.ref_name }} から main への反映"
          body: |
            GitHub Actionsによって自動生成されたプルリクエストです。
