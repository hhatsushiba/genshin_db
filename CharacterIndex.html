<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクターDB</title>
    <link rel="stylesheet" href="public/css/character/style-common.css">
    <script>
        (function(){
            var head = document.getElementsByTagName('head')[0];
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            var ua = navigator.userAgent || '';
            var isMobileLike = /iPhone|Android/.test(ua) || /iPad/.test(ua) || window.innerWidth <= 600;
            link.href = isMobileLike ? 'public/css/character/style_sp.css' : 'public/css/character/style_pc.css';
            head.appendChild(link);

            var pending;
            window.addEventListener('resize', function(){
                clearTimeout(pending);
                pending = setTimeout(function(){
                    var nowMobile = /iPhone|Android/.test(navigator.userAgent || '') || /iPad/.test(navigator.userAgent || '') || window.innerWidth <= 600;
                    var desired = nowMobile ? 'public/css/character/style_sp.css' : 'public/css/character/style_pc.css';
                    if (link.href.indexOf(desired) === -1) {
                        link.href = desired;
                    }
                }, 150);
            });
        })();
    </script>
</head>
<body>
    <div class="page-container">
        <header class="hero-card">
            <div>
                <p class="eyebrow">Genshin Character Database</p>
                <h1>原神キャラクターDB</h1>
                <p class="hero-copy">キャラクター情報を確認できます。</p>
            </div>
            <div class="hero-actions">
                <a class="ghost-link" href="index.html">トップへ戻る</a>
                <a class="ghost-link" href="CalculatorIndex.html">キャラクター育成素材計算へ</a>
            </div>
        </header>

        <main class="layout-grid">
            <section class="panel controls-panel">
                <div class="panel-heading">
                    <h2>条件設定</h2>
                    <div class="filter-controls">
                        <div class="filter-group">
                            <div class="filter-label">モード：</div>
                            <div class="mode-controls">
                                <button class="mode-btn active" data-mode="all">全体表示</button>
                                <button class="mode-btn" data-mode="break">突破表示</button>
                                <button class="mode-btn" data-mode="talent">天賦表示</button>
                            </div>
                        </div>
                        <div class="filter-group">
                            <div class="filter-label">元　素：</div>
                            <div id="element-filters" class="filter-buttons"></div>
                        </div>
                        <div class="filter-group">
                            <div class="filter-label">武　器：</div>
                            <div id="weapon-filters" class="filter-buttons"></div>
                        </div>
                        <div class="filter-group filter-other">
                            <div class="filter-label">その他：</div>
                            <button id="advanced-filter-btn" class="filter-advanced">詳細フィルター</button>
                        </div>
                    </div>
                </div>
            </section>

            <div id="status" class="status-message">データを読み込み中...</div>

            <div class="table-container" id="table-wrap" style="display: none;">
                <table id="character-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名前</th>
                            <th>元素</th>
                            <th>武器種</th>
                            <th>ボス素材</th>
                            <th>敵素材</th>
                            <th>特産品</th>
                            <th>天賦本</th>
                            <th>週ボス</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </main>

        <div id="filter-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title-actions">
                        <h2>詳細フィルター</h2>
                    </div>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-tabs" id="modal-tabs">
                        <button class="tab-btn active" data-target="tab-boss">ボス素材</button>
                        <button class="tab-btn" data-target="tab-enemy">敵素材</button>
                        <button class="tab-btn" data-target="tab-specialty">特産品</button>
                        <button class="tab-btn" data-target="tab-talent">天賦本</button>
                        <button class="tab-btn" data-target="tab-weekly">週ボス</button>
                    </div>
                    <div class="tab-contents">
                        <div id="tab-boss" class="tab-panel active">
                            <div id="boss-filters" class="modal-filter-list"></div>
                        </div>
                        <div id="tab-enemy" class="tab-panel">
                            <div id="enemy-filters" class="modal-filter-list"></div>
                        </div>
                        <div id="tab-specialty" class="tab-panel">
                            <div id="specialty-filters" class="modal-filter-list"></div>
                        </div>
                        <div id="tab-talent" class="tab-panel">
                            <div id="talent-filters" class="modal-filter-list"></div>
                        </div>
                        <div id="tab-weekly" class="tab-panel">
                            <div id="weekly-filters" class="modal-filter-list"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-reset-btn">リセット</button>
                    <button type="button" class="btn btn-primary modal-apply-btn">適用</button>
                </div>
            </div>
        </div>
        <div id="modal-overlay" class="modal-overlay" style="display: none;"></div>
        <footer>
            <p>本サイトは個人が作成したファンサイトであり、公式とは一切関係ありません。使用しているゲーム内情報の著作権は、miHoYo / HoYoverseに帰属します。</p>
            <p class="copyright">© COGNOSPHERE. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="public/js/character/script.js"></script>
</body>
</html>
